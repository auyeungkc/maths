<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>面積公式的概念及認識</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f4f8;
            --accent-color: #ffcc00;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #header {
            text-align: center;
            padding: 15px;
            background: white;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 100;
        }

        #main-container {
            display: flex;
            flex: 1;
            width: 100%;
            padding: 20px;
            gap: 20px;
            box-sizing: border-box;
        }

        #sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 50;
        }

        #canvas-area {
            flex: 1;
            background: white;
            border-radius: 15px;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            /* 移除 overflow:hidden 以便讓拖動中的方塊跨越邊界 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #target-rect {
            border: 3px solid #333;
            position: relative;
            background: #fafafa;
            pointer-events: none; /* 讓方塊可以順利放在上方而不被干擾 */
        }

        .label {
            position: absolute;
            font-weight: bold;
            color: #d32f2f;
            font-size: 18px;
            white-space: nowrap;
        }

        #dispenser-container {
            border: 2px dashed #aaa;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            background: #fffdf0;
        }

        .unit-square {
            width: 20px;
            height: 20px;
            background-color: var(--accent-color);
            border: 0.5px solid #b8860b;
            position: fixed; /* 改為 fixed 以便跨越所有區域移動 */
            cursor: grab;
            touch-action: none;
            will-change: transform;
            z-index: 1000;
        }

        .source-square {
            display: inline-block;
            width: 30px;
            height: 30px;
            background-color: var(--accent-color);
            border: 2px solid #b8860b;
            cursor: pointer;
            margin-bottom: 10px;
        }

        input[type="number"] {
            width: 100px;
            padding: 12px;
            font-size: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
        }

        button {
            padding: 12px;
            font-size: 18px;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        button.secondary { background-color: #7f8c8d; }
        button.reset { background-color: #e74c3c; }

        #feedback {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="header">
    <h1 style="margin:0">面積公式的概念及認識</h1>
</div>

<div id="main-container">
    <div id="sidebar">
        <div id="dispenser-container">
            <p><strong>拖曳出正方形</strong></p>
            <div id="dispenser" class="source-square"></div>
            <p>(邊長 1cm)</p>
        </div>

        <div style="margin-top: 10px;">
            <label>長方形的面積是？</label><br>
            <input type="number" id="answer-input" pattern="\d*"> 平方厘米
        </div>

        <button onclick="checkAnswer()">核對答案</button>
        <button class="secondary" onclick="clearSquares()">清除所有正方形</button>
        <button class="reset" onclick="initGame()">換一題</button>

        <div id="feedback"></div>
    </div>

    <div id="canvas-area">
        <div id="target-rect">
            </div>
    </div>
</div>

<script>
    const SCALE = 20; 
    let currentWidth = 0;
    let currentHeight = 0;
    const targetRect = document.getElementById('target-rect');
    const feedback = document.getElementById('feedback');
    const dispenser = document.getElementById('dispenser');

    let activeElement = null;
    let startX, startY, initialX, initialY;

    function initGame() {
        currentWidth = Math.floor(Math.random() * (12 - 8 + 1)) + 8;
        currentHeight = Math.floor(Math.random() * (20 - 16 + 1)) + 16;
        
        targetRect.style.width = (currentWidth * SCALE) + 'px';
        targetRect.style.height = (currentHeight * SCALE) + 'px';
        
        document.querySelectorAll('.label').forEach(l => l.remove());
        createLabel(currentWidth + " cm", "top");
        createLabel(currentHeight + " cm", "left");

        clearSquares();
        feedback.innerHTML = "";
        document.getElementById('answer-input').value = "";
    }

    function createLabel(text, pos) {
        const span = document.createElement('span');
        span.className = 'label';
        span.innerText = text;
        targetRect.appendChild(span);
        if(pos === "top") {
            span.style.top = "-30px"; span.style.left = "50%"; span.style.transform = "translateX(-50%)";
        } else {
            span.style.left = "-65px"; span.style.top = "50%"; span.style.transform = "translateY(-50%) rotate(-90deg)";
        }
    }

    function startDrag(e, el) {
        activeElement = el;
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        
        const rect = activeElement.getBoundingClientRect();
        
        // 紀錄初始相對於視窗的位置
        initialX = rect.left;
        initialY = rect.top;
        
        startX = clientX;
        startY = clientY;

        activeElement.style.zIndex = 10000;
        activeElement.style.cursor = 'grabbing';
    }

    window.addEventListener('mousemove', handleMove, { passive: false });
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    function handleMove(e) {
        if (!activeElement) return;
        e.preventDefault();

        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);

        const dx = clientX - startX;
        const dy = clientY - startY;

        activeElement.style.left = (initialX + dx) + 'px';
        activeElement.style.top = (initialY + dy) + 'px';
    }

    function endDrag() {
        if (activeElement) {
            activeElement.style.cursor = 'grab';
            activeElement = null;
        }
    }

    // 關鍵修改：從點擊那一刻起就讓方塊跟隨
    dispenser.addEventListener('mousedown', (e) => spawnAndDrag(e));
    dispenser.addEventListener('touchstart', (e) => spawnAndDrag(e));

    function spawnAndDrag(e) {
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);

        const newSq = document.createElement('div');
        newSq.className = 'unit-square';
        
        // 設置初始位置在手指/滑鼠正中心
        newSq.style.left = (clientX - 10) + 'px';
        newSq.style.top = (clientY - 10) + 'px';
        
        document.body.appendChild(newSq); // 改為掛載在 body，不受區域限制
        
        newSq.addEventListener('mousedown', (ev) => startDrag(ev, newSq));
        newSq.addEventListener('touchstart', (ev) => startDrag(ev, newSq));

        startDrag(e, newSq);
    }

    function clearSquares() {
        document.querySelectorAll('.unit-square').forEach(s => s.remove());
    }

    function checkAnswer() {
        const userAns = parseInt(document.getElementById('answer-input').value);
        const correctAns = currentWidth * currentHeight;
        if (userAns === correctAns) {
            feedback.innerHTML = '<div style="font-size:40px">🎉🌟</div>太棒了！答對了！';
            feedback.style.color = "#2ecc71";
        } else {
            feedback.innerHTML = '<div style="font-size:40px">💪🐻</div>加油！再試試看！';
            feedback.style.color = "#e67e22";
        }
    }

    initGame();
</script>

</body>
</html>
