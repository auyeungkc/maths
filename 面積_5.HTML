<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>面積公式的概念及認識</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f4f8;
            --accent-color: #ffcc00;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #header {
            text-align: center;
            padding: 15px;
            background: white;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 100;
        }

        #main-container {
            display: flex;
            flex: 1;
            width: 100%;
            padding: 20px;
            gap: 20px;
            box-sizing: border-box;
        }

        #sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 50;
        }

        #canvas-area {
            flex: 1;
            background: white;
            border-radius: 15px;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #target-rect {
            border: 3px solid #333;
            position: relative; 
            background: #fafafa;
        }

        .label {
            position: absolute;
            font-weight: bold;
            color: #d32f2f;
            font-size: 18px;
            white-space: nowrap;
            pointer-events: none;
        }

        #dispenser-container {
            border: 2px dashed #aaa;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            background: #fffdf0;
        }

        /* 核心修改：全部使用 fixed 定位，徹底隔絕容器干擾 */
        .unit-square {
            width: 20px;
            height: 20px;
            background-color: var(--accent-color);
            border: 0.5px solid #b8860b;
            position: fixed; 
            cursor: grab;
            touch-action: none;
            z-index: 1000;
            box-sizing: border-box;
            transition: none !important;
        }

        .source-square {
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: var(--accent-color);
            border: 1px solid #b8860b;
            cursor: pointer;
            vertical-align: middle;
        }

        .square-info {
            font-size: 14px;
            color: #333;
            margin-top: 8px;
            line-height: 1.6;
        }

        input[type="number"] {
            width: 100px;
            padding: 12px;
            font-size: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
        }

        button {
            padding: 12px;
            font-size: 18px;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        button.secondary { background-color: #7f8c8d; }
        button.reset { background-color: #e74c3c; }

        #feedback {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="header">
    <h1 style="margin:0">面積公式的概念及認識</h1>
</div>

<div id="main-container">
    <div id="sidebar">
        <div id="dispenser-container">
            <p><strong>拖曳出正方形</strong></p>
            <div id="dispenser" class="source-square"></div>
            <div class="square-info">
                邊長 1cm<br>
                面積 1平方厘米 (1cm²)
            </div>
        </div>

        <div style="margin-top: 10px;">
            <label>長方形的面積是？</label><br>
            <input type="number" id="answer-input" pattern="\d*"> 平方厘米
        </div>

        <button onclick="checkAnswer()">核對答案</button>
        <button class="secondary" onclick="clearSquares()">清除所有正方形</button>
        <button class="reset" onclick="initGame()">換一題</button>

        <div id="feedback"></div>
    </div>

    <div id="canvas-area">
        <div id="target-rect"></div>
    </div>
</div>

<script>
    const SCALE = 20; 
    let currentWidth = 0;
    let currentHeight = 0;
    const targetRect = document.getElementById('target-rect');
    const feedback = document.getElementById('feedback');
    const dispenser = document.getElementById('dispenser');

    let activeElement = null;
    let grabOffsetX = 0;
    let grabOffsetY = 0;

    // 用來紀錄每個正方形相對於長方形左上角的「固定位移」
    const squareOffsets = new Map();

    function initGame() {
        currentWidth = Math.floor(Math.random() * (12 - 8 + 1)) + 8;
        currentHeight = Math.floor(Math.random() * (20 - 16 + 1)) + 16;
        
        targetRect.style.width = (currentWidth * SCALE) + 'px';
        targetRect.style.height = (currentHeight * SCALE) + 'px';
        
        document.querySelectorAll('.label').forEach(l => l.remove());
        createLabel(currentWidth + " cm", "top");
        createLabel(currentHeight + " cm", "left");

        clearSquares();
        feedback.innerHTML = "";
        document.getElementById('answer-input').value = "";
    }

    function createLabel(text, pos) {
        const span = document.createElement('span');
        span.className = 'label';
        span.innerText = text;
        targetRect.appendChild(span);
        if(pos === "top") {
            span.style.top = "-30px"; span.style.left = "50%"; span.style.transform = "translateX(-50%)";
        } else {
            span.style.left = "-65px"; span.style.top = "50%"; span.style.transform = "translateY(-50%) rotate(-90deg)";
        }
    }

    // 重新校準所有正方形的位置（縮放或放手時調用）
    function syncAllSquares() {
        const rect = targetRect.getBoundingClientRect();
        squareOffsets.forEach((offset, el) => {
            if (el !== activeElement) {
                el.style.left = (rect.left + offset.x) + 'px';
                el.style.top = (rect.top + offset.y) + 'px';
            }
        });
    }

    // 監聽視窗縮放
    window.addEventListener('resize', syncAllSquares);

    function startDrag(e, el) {
        activeElement = el;
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        
        const rect = activeElement.getBoundingClientRect();
        grabOffsetX = clientX - rect.left;
        grabOffsetY = clientY - rect.top;

        activeElement.style.zIndex = 10000;
    }

    function handleMove(e) {
        if (!activeElement) return;
        if (e.cancelable) e.preventDefault();

        const clientX = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
        const clientY = (e.type === 'touchmove') ? e.touches[0].clientY : e.clientY;

        activeElement.style.left = (clientX - grabOffsetX) + 'px';
        activeElement.style.top = (clientY - grabOffsetY) + 'px';
    }

    function endDrag(e) {
        if (!activeElement) return;

        // 放手那一刻，計算並存入相對於長方形的座標
        const elRect = activeElement.getBoundingClientRect();
        const targetRectBounds = targetRect.getBoundingClientRect();

        squareOffsets.set(activeElement, {
            x: elRect.left - targetRectBounds.left,
            y: elRect.top - targetRectBounds.top
        });

        activeElement.style.zIndex = 1000;
        activeElement = null;
        syncAllSquares(); // 再次強制同步
    }

    window.addEventListener('mousemove', handleMove, { passive: false });
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    function spawnAndDrag(e) {
        e.preventDefault();
        const newSq = document.createElement('div');
        newSq.className = 'unit-square';
        
        const clientX = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
        const clientY = (e.type === 'touchstart') ? e.touches[0].clientY : e.clientY;

        newSq.style.left = (clientX - 10) + 'px';
        newSq.style.top = (clientY - 10) + 'px';
        
        document.body.appendChild(newSq);
        
        newSq.addEventListener('mousedown', (ev) => {
            ev.stopPropagation();
            startDrag(ev, newSq);
        });
        newSq.addEventListener('touchstart', (ev) => {
            ev.stopPropagation();
            startDrag(ev, newSq);
        });

        startDrag(e, newSq);
    }

    dispenser.addEventListener('mousedown', spawnAndDrag);
    dispenser.addEventListener('touchstart', spawnAndDrag);

    function clearSquares() {
        squareOffsets.clear();
        document.querySelectorAll('.unit-square').forEach(s => s.remove());
    }

    function checkAnswer() {
        const userAns = parseInt(document.getElementById('answer-input').value);
        const correctAns = currentWidth * currentHeight;
        if (userAns === correctAns) {
            feedback.innerHTML = '<div style="font-size:40px">🎉🌟</div>太棒了！答對了！';
            feedback.style.color = "#2ecc71";
        } else {
            feedback.innerHTML = '<div style="font-size:40px">💪🐻</div>加油！再試試看！';
            feedback.style.color = "#e67e22";
        }
    }

    initGame();
</script>

</body>
</html>
